<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Katalog UMKM & Generator Caption AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-12">

  <!-- Header -->
  <header class="bg-indigo-600 text-white py-6 shadow-md mb-8">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h1 class="text-2xl sm:text-3xl font-bold">Katalog Produk UMKM Desa</h1>
      <p class="text-indigo-100 mt-1 text-sm sm:text-base">Promosi Produk Lokal & Generator Caption Promosi Otomatis</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 space-y-8">

    <!-- Form Generator Caption AI -->
    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <span>✨</span> Generator Caption Pintar (Gemini AI)
      </h2>

      <div class="space-y-4">
        <!-- Input Nama & Harga -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Produk</label>
            <input 
              id="in-nama-produk" 
              type="text" 
              placeholder="Contoh: Keripik Singkong Balado" 
              class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Harga (Rp)</label>
            <input 
              id="in-harga-produk" 
              type="text" 
              placeholder="Contoh: 15.000" 
              class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
            />
          </div>
        </div>

        <!-- Detail Tambahan -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Keunggulan / Detail Produk (Opsional)</label>
          <textarea 
            id="in-detail-produk" 
            rows="2" 
            placeholder="Contoh: Renyah, tanpa pengawet, dibuat dari singkong pilihan desa." 
            class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          ></textarea>
        </div>

        <!-- Tombol Generate -->
        <button 
          onclick="generateCaption()" 
          id="btn-generate"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2"
        >
          <span>Buat Caption Promosi</span>
        </button>
      </div>

      <!-- Result Area -->
      <div id="result-box" class="hidden mt-6 pt-4 border-t border-gray-100">
        <label class="block text-sm font-medium text-gray-700 mb-2">Hasil Caption AI:</label>
        <div id="caption-output" class="p-4 bg-gray-50 rounded-lg border border-gray-200 text-sm text-gray-800 whitespace-pre-line leading-relaxed"></div>
        <button 
          onclick="copyCaption()" 
          class="mt-3 text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-1.5 px-3 rounded transition"
        >
          📋 Salin Caption
        </button>
      </div>
    </section>

  </main>

  <script>
    async function generateCaption() {
      const nama = document.getElementById('in-nama-produk').value.trim();
      const harga = document.getElementById('in-harga-produk').value.trim();
      const detail = document.getElementById('in-detail-produk').value.trim();

      const btn = document.getElementById('btn-generate');
      const resultBox = document.getElementById('result-box');
      const captionOutput = document.getElementById('caption-output');

      if (!nama || !harga) {
        alert('Mohon isi Nama Produk dan Harga!');
        return;
      }

      btn.disabled = true;
      btn.innerText = 'Membuat Caption...';

      try {
        // Memanggil API backend serverless di Vercel
        const response = await fetch('/api/generate-caption', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ nama, harga, detail })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Terjadi kesalahan pada server');
        }

        captionOutput.innerText = data.caption;
        resultBox.classList.remove('hidden');
      } catch (err) {
        alert('Gagal membuat caption: ' + err.message);
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerText = 'Buat Caption Promosi';
      }
    }

    function copyCaption() {
      const text = document.getElementById('caption-output').innerText;
      navigator.clipboard.writeText(text);
      alert('Caption berhasil disalin!');
    }
  </script>
</body>
</html>
